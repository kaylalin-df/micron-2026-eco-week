<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>2026 美日森活學・生態守護者檢定</title>
  <meta name="description" content="2026 美光美日森活學 — 從無塵室到雨林的重生之旅。完成生態守護者檢定，領取 rPP 循環再生手機掛繩。" />

  <!-- ===== 字體：思源黑體 / Noto Sans TC（中英數統一） ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <!-- ===== CDN：React 18 + Babel + Tailwind ===== -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Noto Sans TC"', 'system-ui', '-apple-system', '"PingFang TC"', '"Microsoft JhengHei"', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <!-- ===== Umami 流量統計 ===== -->
  <script defer src="https://cloud.umami.is/script.js" data-website-id="c009f35b-f6c7-462c-ac85-2944198772ca"></script>

  <style>
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .animate-fadeUp { animation: fadeUp .4s ease-out both; }
    @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    .animate-floaty { animation: floaty 5s ease-in-out infinite; }
    html, body { -webkit-tap-highlight-color: transparent; font-family: "Noto Sans TC", system-ui, -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif; }

    /* 矮螢幕（iPhone SE / 舊 Android）密度自適應 — 縮小歡迎頁主視覺以免擠壓 */
    @media (max-height: 720px) {
      .hero-card { padding-top: 1rem !important; padding-bottom: 1rem !important; }
      .hero-card > div > * + * { margin-top: 0.6rem !important; }
      .hero-logo { max-width: 300px !important; }
      .hero-pill { font-size: 1.125rem !important; padding-top: 0.375rem !important; padding-bottom: 0.375rem !important; }
    }
    @media (max-height: 640px) {
      .hero-logo { max-width: 250px !important; }
      .hero-pill { font-size: 1rem !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useMemo, useEffect } = React;

    // Umami 事件追蹤（安全包裝：Umami 未載入或離線時不會報錯）
    const track = (name) => { try { window.umami && window.umami.track(name); } catch (e) {} };

    /* =========================================================
       設定區：圖檔路徑與獎品文案（之後換圖只要改這裡）
       ========================================================= */
    const ASSETS = {
      micron:      "micron.jpg",                   // Micron 黑字（白底卡片用）
      micronWhite: "micron-white.png",             // Micron 白字去背（深色 header 用）
      event:       "event-logo-trim.png",          // 美日森活學 活動 LOGO（已去除透明邊距）
      zerozero:    "zerozero-logo.png",             // zero zero LOGO（白字去背）
      prize:       "rpp-strap.png",                // 獎品照片（rPP 循環再生手機掛繩）
    };
    const PRIZE_NAME = "rPP 循環再生手機長掛繩";

    /* ===================== 森林色系 ===================== */
    const C = {
      leaf:   "#1FA24C",  // 活動 LOGO 主綠
      leafLt: "#34C759",
      deep:   "#0b3f2c",
      mid:    "#0e4d36",
    };

    /* ===================== 樹影剪影（程式生成） ===================== */
    const buildTrees = (w, count, base, minH, varH, depth) => {
      let d = `M0,${base + depth} L0,${base} `;
      const step = w / count;
      for (let i = 0; i < count; i++) {
        const x = i * step;
        const h = minH + ((i * 53) % varH);
        const cx = x + step / 2;
        d += `L${x.toFixed(1)},${base} L${cx.toFixed(1)},${(base - h).toFixed(1)} L${(x + step).toFixed(1)},${base} `;
      }
      d += `L${w},${base} L${w},${base + depth} Z`;
      return d;
    };
    const TREE_BACK = buildTrees(400, 8, 55, 30, 30, 50);
    const TREE_FRONT = buildTrees(400, 13, 88, 22, 28, 20);

    const Forest = () => (
      <div className="absolute bottom-0 inset-x-0 h-28 z-0 pointer-events-none">
        <svg viewBox="0 0 400 108" preserveAspectRatio="none" className="w-full h-full">
          <path d={TREE_BACK} fill="#15623f" opacity="0.55" />
          <path d={TREE_FRONT} fill="#06291c" />
        </svg>
      </div>
    );

    /* ===================== 內聯 SVG Icon ===================== */
    const Icon = ({ children, size = 24, className = "", fill = "none", strokeWidth = 2 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor"
        strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true">{children}</svg>
    );
    const Leaf = (p) => <Icon {...p}><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10Z"/><path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"/></Icon>;
    const TreePine = (p) => <Icon {...p}><path d="m17 14 3 3.3a1 1 0 0 1-.7 1.7H4.7a1 1 0 0 1-.7-1.7L7 14h-.3a1 1 0 0 1-.7-1.7L9 9h-.2A1 1 0 0 1 8 7.3L12 3l4 4.3a1 1 0 0 1-.8 1.7H15l3 3.3a1 1 0 0 1-.7 1.7H17Z"/><path d="M12 22v-3"/></Icon>;
    const ChevronRight = (p) => <Icon {...p}><path d="m9 18 6-6-6-6"/></Icon>;
    const ChevronLeft = (p) => <Icon {...p}><path d="m15 18-6-6 6-6"/></Icon>;
    const RotateCcw = (p) => <Icon {...p}><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></Icon>;
    const CheckCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></Icon>;
    const XCircle = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></Icon>;
    const Sparkles = (p) => <Icon {...p}><path d="M9.94 14.06A2 2 0 0 0 8.5 12.6l-5.1-1.3a.5.5 0 0 1 0-.96L8.5 9.04A2 2 0 0 0 9.94 7.6l1.3-5.1a.5.5 0 0 1 .96 0l1.3 5.1A2 2 0 0 0 15.4 9.04l5.1 1.3a.5.5 0 0 1 0 .96l-5.1 1.3a2 2 0 0 0-1.44 1.46l-1.3 5.1a.5.5 0 0 1-.96 0z"/></Icon>;
    const BookmarkCheck = (p) => <Icon {...p}><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/><path d="m9 10 2 2 4-4"/></Icon>;
    const Smartphone = (p) => <Icon {...p}><rect width="14" height="20" x="5" y="2" rx="2"/><path d="M12 18h.01"/></Icon>;

    /* ===================== Logo（圖檔 + 優雅 fallback） ===================== */
    const SmartImg = ({ src, alt, className = "", style, fallback = null }) => {
      const [failed, setFailed] = useState(false);
      if (failed) return fallback;
      return <img src={src} alt={alt} className={className} style={style} onError={() => setFailed(true)} />;
    };
    const MicronWordmark = ({ className = "text-slate-900" }) => (
      <svg viewBox="0 0 110 21" className={`h-full w-auto block ${className}`} fill="none" aria-label="Micron">
        <path d="M 1,18 L 4,18 L 4,10 C 4,7 6,5.5 9,5.5 C 12,5.5 14,7 14,10 L 14,18 M 14,10 C 14,7 16,5.5 19,5.5 C 22,5.5 24,7 24,10 L 24,18 L 27,18" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"/>
        <circle cx="32" cy="2.5" r="1.8" fill="currentColor"/>
        <path d="M 32,7 L 32,18" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round"/>
        <path d="M 46,9 C 45,7 43,5.5 40.5,5.5 C 36.5,5.5 34,8.5 34,12 C 34,15.5 36.5,18.5 40.5,18.5 C 43,18.5 45,17 46,15" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round"/>
        <path d="M 51,7 L 51,18 M 51,11 C 51.5,8.5 53.5,5.5 56.5,5.5" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round"/>
        <circle cx="69" cy="12" r="6" stroke="currentColor" strokeWidth="2.8"/>
        <path d="M 79,18 L 79,10 C 79,7 81,5.5 84,5.5 C 87,5.5 89,7 89,10 L 89,18 L 92,18" stroke="currentColor" strokeWidth="2.8" strokeLinecap="round" strokeLinejoin="round"/>
        <text x="96" y="8" fontSize="6.2" fontWeight="900" fontFamily="sans-serif" fill="currentColor">TM</text>
      </svg>
    );
    const MicronLogo = ({ className = "h-4" }) => (
      <SmartImg src={ASSETS.micron} alt="Micron" className={`${className} w-auto object-contain block`}
        fallback={<div className={`${className} flex items-center`} style={{ aspectRatio: "110/21" }}><MicronWordmark className="text-slate-900" /></div>} />
    );
    const MicronLogoWhite = ({ className = "h-5" }) => (
      <SmartImg src={ASSETS.micronWhite} alt="Micron" className={`${className} w-auto object-contain block`}
        fallback={<div className={`${className} flex items-center`} style={{ aspectRatio: "110/21" }}><MicronWordmark className="text-white" /></div>} />
    );
    const ZeroZeroLogo = ({ className = "h-7" }) => (
      <SmartImg src={ASSETS.zerozero} alt="zero zero" className={`${className} w-auto object-contain block`}
        fallback={<span className="text-white font-black tracking-widest text-sm">ZERO ZERO</span>} />
    );
    const EventLogo = ({ className = "" }) => (
      <SmartImg src={ASSETS.event} alt="美日森活學" className={`${className} object-contain`}
        fallback={<h1 className="text-3xl font-black text-slate-900 tracking-tight">美日森活學</h1>} />
    );

    /* ===================== 題庫 ===================== */
    const QUESTIONS = [
      {
        id: 1,
        question: "Q1：無塵室中退役的晶舟盒，為什麼能華麗轉身成為生物的五星級豪宅？",
        options: [
          { key: "A", text: "一般易刮傷的壓克力", isCorrect: false },
          { key: "B", text: "半導體級 PC/PP 材質，氣密、耐衝擊且無毒", isCorrect: true },
          { key: "C", text: "遇水會原地解體的特製紙箱", isCorrect: false },
        ],
        explanation: "晶舟盒採用半導體等級的 PC/PP 材質，氣密、耐衝擊又完全無毒，100% 回收再利用後依然超堅固，給生物最安心的居家體驗！",
      },
      {
        id: 2,
        question: "Q2：TNFD「大自然存摺」關注的是企業對哪一類「資產」的依賴與影響？",
        options: [
          { key: "A", text: "自然資本——乾淨的水、空氣與生物多樣性等生態系服務", isCorrect: true },
          { key: "B", text: "廠房、機台等有形固定資產", isCorrect: false },
          { key: "C", text: "股票、債券等金融資產", isCorrect: false },
        ],
        explanation: "TNFD（自然相關財務揭露）把大自然視為一本「資產存摺」——乾淨的水、空氣與生物多樣性等生態系服務，都是企業營運（尤其高精密製程）默默依賴的「自然資本」。守護生態，就是守護美光的生產基礎！",
      },
      {
        id: 3,
        question: "Q3：哪一款 Re: 缸，模擬出最接近熱帶雨林的高濕度空氣循環？",
        options: [
          { key: "A", text: "乾旱沙漠造景的多肉缸", isCorrect: false },
          { key: "B", text: "高濕度的 MOSS 雨林缸", isCorrect: true },
          { key: "C", text: "潮間帶的招潮蟹半水景", isCorrect: false },
        ],
        explanation: "原本在無塵室隔絕微塵的氣密超能力，轉生後剛好鎖住 MOSS 雨林缸飽滿的水氣，重現最接近熱帶雨林的濕潤循環！",
      },
    ];

    const shuffle = (arr) => {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    };

    /* ===================== 主程式 ===================== */
    function App() {
      const [nickname, setNickname] = useState("");
      const [step, setStep] = useState("welcome"); // welcome | quiz | feedback | success
      const [qIndex, setQIndex] = useState(0);
      const [order, setOrder] = useState([0, 1, 2]);
      const [selected, setSelected] = useState(null);
      const [errorInput, setErrorInput] = useState(false);

      const q = QUESTIONS[qIndex];
      const displayOptions = useMemo(() => order.map((i) => q.options[i]), [order, q]);
      const selectedOption = selected === null ? null : displayOptions[selected];
      const isCorrect = selectedOption?.isCorrect;
      const pad = (n) => String(n).padStart(2, "0");

      // 開啟 App 時記錄一次（另外 Umami 也會自動計算 pageview）
      useEffect(() => { track("app_open"); }, []);

      const startChallenge = (e) => {
        e?.preventDefault?.();
        if (!nickname.trim()) { setErrorInput(true); return; }
        setErrorInput(false);
        setQIndex(0); setOrder(shuffle([0, 1, 2])); setSelected(null); setStep("quiz");
      };
      const selectOption = (idx) => {
        if (selected !== null) return;
        setSelected(idx);
        setTimeout(() => setStep("feedback"), 450);
      };
      const advance = () => {
        if (isCorrect) {
          if (qIndex < QUESTIONS.length - 1) {
            setQIndex((p) => p + 1); setOrder(shuffle([0, 1, 2])); setSelected(null); setStep("quiz");
          } else { track("complete"); setStep("success"); }
        } else { setSelected(null); setStep("quiz"); }
      };
      const goPrev = () => {
        if (qIndex > 0) { setQIndex((p) => p - 1); setOrder(shuffle([0, 1, 2])); setSelected(null); setStep("quiz"); }
      };
      const goHome = () => { setNickname(""); setQIndex(0); setSelected(null); setStep("welcome"); };

      return (
        <div className="min-h-[100dvh] bg-[#06281b] flex items-center justify-center p-0 md:p-4 font-sans antialiased selection:bg-emerald-300/40">
          {/* 手機框：手機全螢幕、桌機顯示框；森林綠漸層底 */}
          <div className="w-full max-w-md min-h-[100dvh] md:min-h-[812px] md:max-h-[90vh] md:rounded-[40px] shadow-[0_20px_60px_rgba(0,0,0,0.35)] overflow-hidden relative flex flex-col bg-gradient-to-b from-[#0e4d36] via-[#0b3f2c] to-[#072c1e]">

            {/* 光暈與樹影 */}
            <div className="absolute -top-24 -right-16 w-72 h-72 bg-emerald-300/15 rounded-full blur-[90px] pointer-events-none" />
            <div className="absolute top-1/3 -left-20 w-64 h-64 bg-lime-300/10 rounded-full blur-[80px] pointer-events-none" />
            <Forest />

            {/* 頂部導航：micron 白色標籤 ×（活動點綴） */}
            <header className="px-5 pb-3 flex items-center justify-between z-20 relative"
              style={{ paddingTop: "calc(env(safe-area-inset-top) + 1.25rem)" }}>
              {/* 左：白色去背 Micron（較前一版放大 30%） */}
              <MicronLogoWhite className="h-[26px] shrink-0 drop-shadow-[0_1px_2px_rgba(0,0,0,0.25)]" />
              {/* 右：zero zero LOGO（往左移 1/3 個 LOGO 寬） */}
              <ZeroZeroLogo className="h-9 shrink-0 -translate-x-1/3 drop-shadow-[0_1px_2px_rgba(0,0,0,0.25)]" />
            </header>

            <main className="flex-1 overflow-y-auto px-5 py-3 flex flex-col relative z-10 scrollbar-hide">

              {/* ===== Welcome ===== */}
              {step === "welcome" && (
                <div className="flex-1 flex flex-col animate-fadeUp">
                  <div className="m-auto w-full space-y-4 py-2">
                    {/* Hero 白卡：活動 LOGO */}
                    <div className="hero-card bg-white rounded-3xl px-2 py-6 shadow-[0_16px_40px_-12px_rgba(0,0,0,0.4)] text-center space-y-4 relative overflow-hidden">
                      <div className="absolute -right-6 -bottom-6 text-emerald-50"><TreePine size={120} /></div>
                      <div className="relative z-10 space-y-4">
                        <EventLogo className="hero-logo w-full max-w-[360px] h-auto mx-auto animate-floaty" />
                        <div className="hero-pill inline-flex items-center gap-2 px-6 py-2.5 rounded-full bg-emerald-600 text-white text-[22px] font-black tracking-[0.1em]">
                          <Sparkles size={18} /> 生態守護者檢定
                        </div>
                        <p className="hero-sub text-slate-500 text-[13px] font-medium">從無塵室到雨林的重生之旅</p>
                      </div>
                    </div>

                    {/* 完賽禮 + 規則：森林玻璃卡 */}
                    <div className="rounded-2xl bg-white/10 border border-white/15 backdrop-blur-md p-4 space-y-3 relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-1 h-full bg-gradient-to-b from-lime-300 to-emerald-400" />
                      <p className="text-sm text-white/90 leading-relaxed font-medium pl-2">
                        完成檢定好禮：<br/>
                        可獲得 <span className="text-lime-300 font-bold">100% {PRIZE_NAME}</span>（送完為止）。
                      </p>
                      <div className="flex items-start gap-2 pl-2 pt-2 border-t border-white/10">
                        <BookmarkCheck size={15} className="text-lime-300 mt-0.5 shrink-0" />
                        <p className="text-xs text-white/70 leading-relaxed">
                          共 3 題，關乎晶舟盒材質、TNFD 大自然存摺與 Re: 缸生態。答錯會提供解析、重答該題即可，答對 3 題即可通關！
                        </p>
                      </div>
                    </div>

                    <form onSubmit={startChallenge} className="space-y-3 pt-1">
                    <div className="space-y-1.5">
                      <label htmlFor="nickname" className="text-[10px] font-black text-white/60 tracking-[0.15em] uppercase pl-1 block">
                        輸入挑戰暱稱 / Nickname
                      </label>
                      <input id="nickname" type="text" value={nickname} enterKeyHint="go"
                        onChange={(e) => { setNickname(e.target.value); if (e.target.value.trim()) setErrorInput(false); }}
                        placeholder="例如：永續先鋒小美"
                        className={`w-full px-5 py-4 rounded-xl bg-white text-slate-900 placeholder-slate-300 text-base focus:outline-none transition-all duration-300 border ${errorInput ? "border-red-400 focus:ring-4 focus:ring-red-400/20" : "border-transparent focus:ring-4 focus:ring-lime-300/30"}`} />
                      {errorInput && (
                        <p className="text-red-200 text-xs flex items-center gap-1 pl-1 font-medium">
                          <XCircle size={12} /><span>請先輸入暱稱才能開始</span>
                        </p>
                      )}
                    </div>
                    <button type="submit"
                      className="w-full relative overflow-hidden rounded-xl bg-gradient-to-r from-lime-400 to-emerald-500 text-emerald-950 font-black py-4 flex items-center justify-center gap-2 transition-all duration-300 active:scale-95 shadow-[0_10px_25px_-6px_rgba(132,204,22,0.5)]">
                      <span className="tracking-widest text-base">開始重生之旅</span>
                      <ChevronRight size={18} strokeWidth={2.6} />
                    </button>
                    </form>
                  </div>
                </div>
              )}

              {/* ===== Quiz ===== */}
              {step === "quiz" && (
                <div className="flex-1 flex flex-col justify-between py-2 animate-fadeUp">
                  <div className="space-y-3">
                    <div className="flex justify-between items-center">
                      <span className="text-sm font-bold text-white bg-white/15 px-3 py-1 rounded-full border border-white/15 max-w-[58%] truncate">
                        {nickname}
                      </span>
                      <span className="text-[11px] font-black text-lime-300 tracking-[0.2em]">
                        第 {pad(qIndex + 1)} / {pad(QUESTIONS.length)} 題
                      </span>
                    </div>
                    <div className="w-full h-1.5 bg-white/15 rounded-full overflow-hidden">
                      <div className="h-full bg-gradient-to-r from-lime-300 to-emerald-400 transition-all duration-500 ease-out"
                        style={{ width: `${((qIndex + 1) / QUESTIONS.length) * 100}%` }} />
                    </div>
                  </div>

                  <div className="space-y-5 my-auto">
                    <div className="bg-white rounded-2xl p-5 shadow-lg relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-lime-400 to-emerald-500" />
                      <h2 className="text-lg md:text-xl font-bold text-slate-900 leading-relaxed pt-1">{q.question}</h2>
                    </div>
                    <div className="space-y-3">
                      {displayOptions.map((option, idx) => {
                        const isSel = selected === idx;
                        let s = "border-white/0 bg-white text-slate-700 shadow-md hover:bg-emerald-50 active:scale-[0.99]";
                        if (isSel) s = option.isCorrect
                          ? "bg-emerald-50 text-emerald-900 font-semibold ring-2 ring-emerald-500 shadow-md"
                          : "bg-red-50 text-red-900 font-semibold ring-2 ring-red-400 shadow-md";
                        return (
                          <button key={idx} disabled={selected !== null} onClick={() => selectOption(idx)}
                            className={`w-full p-4 rounded-xl text-left text-sm md:text-base transition-all duration-300 flex items-start gap-3 leading-relaxed border ${s}`}>
                            <span className={`inline-flex items-center justify-center w-6 h-6 rounded-md text-xs font-black shrink-0 ${isSel ? (option.isCorrect ? "bg-emerald-600 text-white" : "bg-red-500 text-white") : "bg-emerald-100 text-emerald-700"}`}>
                              {"ABC"[idx]}
                            </span>
                            <span className="flex-1 pt-0.5">{option.text}</span>
                            {isSel && (option.isCorrect
                              ? <CheckCircle className="text-emerald-600 shrink-0 self-center" size={20} />
                              : <XCircle className="text-red-500 shrink-0 self-center" size={20} />)}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                </div>
              )}

              {/* ===== Feedback ===== */}
              {step === "feedback" && (
                <div className="flex-1 flex flex-col justify-between py-2 animate-fadeUp">
                  <div className="text-center space-y-5 my-auto">
                    <div className={`inline-flex p-4 rounded-full ${isCorrect ? "bg-emerald-500/20 text-lime-300" : "bg-red-500/20 text-red-300"}`}>
                      {isCorrect ? <CheckCircle size={44} /> : <XCircle size={44} />}
                    </div>
                    <div className="space-y-1">
                      <p className={`text-xs font-black tracking-[0.2em] uppercase ${isCorrect ? "text-lime-300" : "text-red-300"}`}>
                        {isCorrect ? "答對了！" : "再想想～"}
                      </p>
                      <h3 className="text-2xl font-black text-white">知識解析</h3>
                    </div>

                    <div className="p-6 rounded-2xl bg-white shadow-xl text-left relative overflow-hidden">
                      <div className="absolute -right-5 -bottom-5 opacity-[0.06] text-emerald-700"><Leaf size={120} /></div>
                      <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-lime-400 to-emerald-500" />
                      <p className="text-slate-700 text-sm md:text-base leading-relaxed font-medium relative z-10">{q.explanation}</p>
                    </div>
                  </div>

                  <div className="flex gap-3">
                    {qIndex > 0 && (
                      <button onClick={goPrev}
                        className="flex-1 rounded-xl font-black py-4 flex items-center justify-center gap-1 bg-white/5 border border-white/20 text-white/80 backdrop-blur transition-all duration-300 active:scale-95">
                        <ChevronLeft size={16} />
                        <span className="tracking-widest text-sm">上一題</span>
                      </button>
                    )}
                    <button onClick={advance}
                      className={`${qIndex > 0 ? "flex-[2]" : "w-full"} rounded-xl font-black py-4 flex items-center justify-center gap-2 transition-all duration-300 active:scale-95 shadow-lg bg-gradient-to-r from-lime-400 to-emerald-500 text-emerald-950`}>
                      {!isCorrect && <RotateCcw size={16} />}
                      <span className="tracking-widest text-sm">
                        {isCorrect ? (qIndex < QUESTIONS.length - 1 ? "下一題" : "看結果") : "重答這一題"}
                      </span>
                      {isCorrect && <ChevronRight size={18} strokeWidth={2.6} />}
                    </button>
                  </div>
                </div>
              )}

              {/* ===== Success ===== */}
              {step === "success" && (
                <div className="py-2 space-y-4 animate-fadeUp">
                    <div className="text-center pt-1">
                      <h2 className="text-xl font-black text-white flex items-center justify-center gap-2">
                        <Sparkles className="text-lime-300" size={18} /><span>恭喜通關！</span><Sparkles className="text-lime-300" size={18} />
                      </h2>
                    </div>

                    {/* 完賽證書白卡 */}
                    <div className="bg-white p-5 rounded-2xl shadow-[0_16px_40px_-12px_rgba(0,0,0,0.4)] relative overflow-hidden">
                      <div className="absolute right-[-24px] top-[-24px] text-emerald-50"><TreePine size={130} /></div>
                      <div className="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-lime-400 via-emerald-500 to-emerald-700" />

                      <div className="space-y-4 pt-2 pb-1 text-center relative z-10">
                        <EventLogo className="w-48 h-auto mx-auto" />
                        <p className="text-[13px] text-slate-400 tracking-[0.2em] uppercase font-bold">認證夥伴 / Verified</p>
                        <div className="inline-block py-1.5 px-6 bg-emerald-50 rounded-lg border border-emerald-100 max-w-full">
                          <span className="text-lg font-black text-emerald-900 tracking-widest break-all">{nickname}</span>
                        </div>
                        <p className="text-xs text-slate-600 leading-relaxed max-w-xs mx-auto px-2 font-medium">
                          恭喜通過「美日森活學」生態守護者檢定，您已初步了解永續科技與自然資本的核心關聯！
                        </p>
                      </div>

                      <div className="mt-4 pt-4 border-t border-slate-100 text-center relative z-10">
                        <div className="bg-gradient-to-r from-lime-50 to-emerald-50 py-3 px-3 rounded-xl border border-emerald-100">
                          <p className="text-[13px] font-medium text-slate-600">請「截圖」並向現場工作人員出示此畫面，即可領取</p>
                          <p className="text-emerald-700 font-black tracking-wide text-[17px] mt-1">{PRIZE_NAME} 一條（送完為止）</p>
                        </div>
                      </div>
                    </div>

                    {/* 底部三欄：左禮品圖 ・ 中循環小知識(含rPP浮水印) ・ 右再玩一次直書按鈕 */}
                    <div className="flex gap-2.5 items-stretch min-h-[190px]">
                      {/* 左：禮品圖（完整顯示 contain） */}
                      <div className="w-24 shrink-0 bg-white rounded-xl overflow-hidden flex items-center justify-center p-2 relative">
                        <SmartImg src={ASSETS.prize} alt={PRIZE_NAME} className="w-full h-full object-contain relative z-10 scale-[1.43]"
                          fallback={null} />
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-emerald-600">
                          <Smartphone size={22} />
                          <span className="text-[8px] font-bold mt-1 uppercase">rPP</span>
                        </div>
                      </div>

                      {/* 中：循環小知識 + 說明內容（右下角 100% rPP 浮水印） */}
                      <div className="flex-1 rounded-xl bg-white/10 border border-white/15 backdrop-blur-md p-3.5 relative overflow-hidden">
                        <span className="absolute right-2 bottom-1 text-[30px] font-black text-white/5 leading-none tracking-tighter text-right">100%<br/>rPP</span>
                        <div className="relative z-10 space-y-1">
                          <h4 className="text-[16px] font-black text-lime-300 tracking-wider uppercase">循環小知識 / Material</h4>
                          <p className="text-[14px] text-white/80 leading-relaxed font-medium">
                            掛繩本體使用與無塵室退役晶舟盒相同的 100% rPP 材質（包含但不限於），經清洗、破碎、熔融、造粒，再抽紗編織而成，讓塑膠從搖籃回到搖籃！
                          </p>
                        </div>
                      </div>

                      {/* 右：再玩一次（直書） */}
                      <button onClick={goHome}
                        className="w-14 shrink-0 bg-white/10 border border-white/20 hover:bg-white/15 text-white/90 font-bold rounded-xl flex items-center justify-center transition-all duration-300 active:scale-95 backdrop-blur">
                        <span className="text-sm tracking-[0.3em]" style={{ writingMode: "vertical-rl", textOrientation: "upright" }}>再玩一次</span>
                      </button>
                    </div>
                </div>
              )}

            </main>

            <footer className="pt-3 text-center border-t border-white/10 text-[9px] text-white/45 font-black tracking-[0.2em] relative z-20"
              style={{ paddingBottom: "calc(env(safe-area-inset-bottom) + 0.75rem)" }}>
              zero zero © 2026 ・ 從無塵室到雨林的重生之旅
            </footer>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
